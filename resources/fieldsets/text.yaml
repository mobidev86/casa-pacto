title: Text
fields:
  -
    handle: text_color
    field:
      type: color
      display: 'Text Color'
  -
    handle: text
    field:
      container: assets
      remove_empty_nodes: false
      type: bard
      display: Text
  -
    handle: checkmarks
    field:
      type: replicator
      display: Checkmarks
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: text
                  field:
                    type: text
                    display: Text
  -
    handle: accordion
    field:
      type: replicator
      display: Accordion
      sets:
        new_set_group:
          display: 'New Set Group'
          sets:
            new_set:
              display: 'New Set'
              fields:
                -
                  handle: title
                  field:
                    type: text
                    display: Title
                -
                  handle: content
                  field:
                    container: assets
                    remove_empty_nodes: false
                    type: bard
                    display: Content
