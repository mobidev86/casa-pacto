title: 'Text + Media'
fields:
  -
    handle: tam_variant
    field:
      options:
        -
          key: 'Variant 1'
          value: 'Variant 1'
        -
          key: 'Variant 2'
          value: 'Variant 2'
        -
          key: 'Variant 3'
          value: 'Variant 3'
      default: 'Variant 1'
      type: button_group
      display: Variant
  -
    handle: column_alignment
    field:
      options:
        -
          key: 'Text Left & Image Right'
          value: 'Text Left & Image Right'
        -
          key: 'Image Left & Text Right'
          value: 'Image Left & Text Right'
      default: 'Text Left & Image Right'
      type: button_group
      display: 'Column Alignment'
      unless:
        tam_variant: 'equals Variant 3'
  -
    handle: section_text
    field:
      type: markdown
      display: Text
      buttons:
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - quote
        - link
        - image
        - table
        - code
        - codeblock
      unless:
        tam_variant: 'equals Variant 3'
  -
    handle: text_media_v3_title
    field:
      type: text
      display: Title
      instructions: 'Use [TEXT] this format for highlight text'
      if:
        tam_variant: 'equals Variant 3'
  -
    handle: text_media_v3_short_description
    field:
      type: textarea
      display: 'Short Description'
      if:
        tam_variant: 'equals Variant 3'
  -
    handle: buttons
    field:
      type: grid
      display: Buttons
      fields:
        -
          handle: button_link
          field:
            text: true
            type: link_it
            display: 'Button Link'
  -
    handle: section_image
    field:
      container: assets
      max_files: 1
      type: assets
      display: 'Section Image'
      width: 50
  -
    handle: section_video
    field:
      container: assets
      max_files: 1
      type: assets
      display: 'Section Video'
      width: 50
      if:
        tam_variant: 'equals Variant 1'
  -
    handle: v2_active_style_element
    field:
      type: toggle
      display: 'Active Style Element'
      if:
        tam_variant: 'equals Variant 2'
  -
    handle: call_to_action_icon
    field:
      type: text
      display: 'Call To Action icon (Font Awesome)'
      if:
        tam_variant: 'equals Variant 2'
        v2_active_style_element: 'equals true'
  -
    handle: call_to_action_title
    field:
      type: text
      display: 'Call To Action Title'
      if:
        tam_variant: 'equals Variant 2'
        v2_active_style_element: 'equals true'
  -
    handle: call_to_action_content
    field:
      type: textarea
      display: 'Call To Action Content'
      if:
        tam_variant: 'equals Variant 2'
        v2_active_style_element: 'equals true'
  -
    handle: v1_active_style_element
    field:
      type: toggle
      display: 'Active Style Element'
      if:
        tam_variant: 'equals Variant 1'
  -
    handle: call_to_action_text
    field:
      type: text
      display: 'Call To Action Text'
      if:
        tam_variant: 'equals Variant 1'
        v1_active_style_element: 'equals true'
  -
    handle: v3_active_style_element
    field:
      type: toggle
      display: 'Active Style Element'
      if:
        tam_variant: 'equals Variant 3'
