title: 'Call to Action'
sections:
  -
    display: 'Call to Action'
    fields:
      -
        handle: cta_heading
        field:
          type: text
          display: Heading
      -
        handle: cta_short_description
        field:
          type: textarea
          display: 'Short Description'
      -
        handle: cta_button
        field:
          text: true
          type: link_it
          display: Button
      -
        handle: cta_image
        field:
          container: assets
          max_files: 1
          type: assets
          display: Image
          width: 50
      -
        handle: after_image_text
        field:
          type: text
          display: 'After Image Text'
          width: 50
