<div class="container">
    <div class="grid md:grid-cols-2 gap-y-4 gap-x-10 lg:gap-y-10 mb-10 md:mb-20">
        <div>
            <h2 class="text-4xl sm:text-5xl 2xl:text-6xl sm:leading-[1.2] font-heading font-semibold uppercase">{{ usp_heading }}</h2>
        </div>
        <div>
            <p>{{ usp_short_description }}</p>
        </div>
    </div>
    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-y-10 gap-x-4">
        {{ if usps_entry }}
            {{ usps_entry }}
                {{ partial:blocks.usps_section.components.item }}
            {{ /usps_entry }}
        {{ else }}
            {{ collection:usps sort="order|asc" }}
                {{ partial:blocks.usps_section.components.item }}
            {{ /collection:usps }}
        {{ /if }}
    </div>
</div>
