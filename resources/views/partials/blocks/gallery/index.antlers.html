<div class="grid grid-cols-12 gap-4 md:gap-x-6 md:gap-y-6.25">
    {{ if gallery_images and gallery_images != "" }}
        {{ gallery_images }}
            {{ if index === 0 && url }}
                <div class="col-span-full lg:col-span-6 lg:row-span-2 h-86 md:h-100 lg:h-[unset]">
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover h-full w-full"/>
                </div>
            {{ elseif index === 1 && url }}
                <div class="h-58 md:h-80 lg:h-101.5 col-span-8 lg:col-span-4">
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover h-full w-full"/>
                </div>
            {{ elseif index === 2 && url }}
                <div class="h-58 md:h-80 lg:h-101.5 col-span-4 lg:col-span-2">
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover h-full w-full"/>
                </div>
            {{ elseif index === 3 && url }}
                <div class="h-58 md:h-80 lg:h-101.5 col-span-4 lg:col-span-2">
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover h-full w-full"/>
                </div>
            {{ elseif index === 4 && url }}
                <div class="h-58 md:h-80 lg:h-101.5 col-span-8 lg:col-span-4">
                    <img src="{{ url }}" alt="{{ alt }}" class="object-cover h-full w-full"/>
                </div>
            {{ /if }}
        {{ /gallery_images }}
    {{ /if }}
</div>
