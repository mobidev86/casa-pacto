<div class="py-40 px-4 md:px-10 relative overflow-hidden">
    <div class="absolute inset-0 after:absolute after:inset-0 after:bg-black/40">
        {{ section_image }}
        <img src="{{ url }}" alt="{{ alt }}" class="w-full h-full object-cover"/>
        {{ /section_image }}
        <img src="assets/images/house-vector.png" alt="House visual" class="absolute right-0 bottom-0 hidden lg:block z-1"/>
        <img src="assets/images/house-vector-mobile.png" alt="House visual" class="absolute right-0 bottom-0 lg:hidden z-1"/>
    </div>
    <div class="max-w-318.75 mx-auto bg-teal text-white py-20 px-6 md:px-10 relative z-2">
        <div class="max-w-254 mx-auto flex flex-col gap-10 text-center">
            <h2 class="text-4xl sm:text-5xl 2xl:text-6xl sm:leading-[1.2] font-heading font-semibold uppercase text-center max-w-125 mx-auto [&_span]:text-lime max-sm:break-all">
                {{ text_media_v3_title
                    | replace('[', '<span>')
                    | replace(']', '</span>')
                    | regex_replace('/\s+/', ' ')
                    | trim
                }}
            </h2>
            <div class="max-w-171.5 mx-auto text-center">
                {{ text_media_v3_short_description }}
            </div>
            <div>
                {{ if button_link }}
                    {{ button_link }}
                    <a href="{{ url }}" target="_blank" class="bg-lime inline-flex items-center justify-between text-white hover:bg-body h-14 gap-3.25 pl-6 pr-6.75 group"> {{ text}}
                        <svg width="13" height="13" viewBox="0 0 13 13" class="group-hover:rotate-45 transition-all duration-300" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M11.5312 0H12.2812V9H10.7812V2.5625L1.5625 11.7812L1.03125 12.3125L0 11.25L0.53125 10.7188L9.75 1.5H3.28125V0H11.5312Z" fill="currentColor"/></svg>
                    </a>
                    {{ /button_link}}
                {{/if }}
            </div>
        </div>
    </div>
</div>
